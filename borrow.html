<body>
<header>


	<h1>Borrow/Return Books!</h1>
	<p>In our library we allow students to borrow and return our books. So they can finish reading it in their homes.</p>
</header>
  
      <!-- Navigation -->
<nav>
  <b>
  <a href="	index.html"> Home</a>
       <a href="books.html"> List of Books</a>
  <a href="registration.html"> Register Now!</a>

    
  </nav>
  </b>
  
  <section>

   <h1>Borrow / Return Form</h1>
 <form action="#" method="post">
<label for="fullname">Full Name:</label>
<input type="text" id="fullname" name="fullname" required>
 <label for="email">Email:</label>
 <input type="email" id="email" name="email" required> <label for="action">Select Action:</label>
 <select id="action" name="action" required> <option value="">--Choose Action--</option>
 <option value="borrow">Borrow Book</option>
 <option value="return">Return Book</option>
 </select>

 <label for="book">Choose a Book:</label>
<select id="book" name="book" required> <option value="">--Select a Book--</option>
 <option value="fantasy">Fantasy</option> <option value="comics">Comics</option>
 <option value="research">Researches</option>
  <option value="horror">Horror</option>
 <option value="comedy">Comedy</option>

</select> <label for="quantity">Quantity:</label>
 <input type="text" id="quantity" name="quantity" required>
 <label for="notes">Notes / Special Requests:</label>
<textarea id="notes" name="notes" rows="4" placeholder="Any additional info?"></textarea>
 <input type="submit" value="Submit">
</form>
 </section>
 
 </body>
